name: CoreAudioTapPoC
options:
  bundleIdPrefix: dev.keisetsu.hazakura-amp
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: 8BNUB2R9C8
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_MODULES: YES
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: Apple Development
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Developer ID Application
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO

targets:
  CoreAudioTapPoC:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    productName: "Hazakura Amp"
    sources:
      - path: CoreAudioTapPoC
        excludes:
          - "Resources/Info.plist"
          - "Resources/HazakuraAmp.entitlements"
    resources:
      - path: CoreAudioTapPoC/Resources/Info.plist
        buildPhase: none
    info:
      path: CoreAudioTapPoC/Resources/Info.plist
      properties:
        CFBundleDisplayName: "Hazakura Amp"
        LSMinimumSystemVersion: "26.0"
        LSUIElement: true
        NSAudioCaptureUsageDescription: "Hazakura Amp uses access to system audio output to apply a local volume boost. It does not record, store, or transmit audio."
        NSHumanReadableCopyright: "Hazakura Amp — Core Audio Tap verification"
        CFBundleShortVersionString: "0.3.1"
        CFBundleVersion: "4"
        HazakuraSigningKind: "$(CODE_SIGN_IDENTITY)"
    entitlements:
      path: CoreAudioTapPoC/Resources/HazakuraAmp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.keisetsu.hazakura-amp
        PRODUCT_NAME: "Hazakura Amp"
        PRODUCT_MODULE_NAME: CoreAudioTapPoC
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: CoreAudioTapPoC/Resources/HazakuraAmp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
        SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
        GCC_TREAT_WARNINGS_AS_ERRORS: NO
    dependencies:
      - sdk: AudioToolbox.framework
      - sdk: AVFAudio.framework
      - sdk: CoreAudio.framework
      - sdk: CoreMedia.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework

  CoreAudioTapPoCTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: CoreAudioTapPoCTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.keisetsu.hazakura-amp.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Hazakura Amp.app/Contents/MacOS/Hazakura Amp"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: CoreAudioTapPoC

schemes:
  CoreAudioTapPoC:
    build:
      targets:
        CoreAudioTapPoC: all
        CoreAudioTapPoCTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CoreAudioTapPoCTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
